<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Labs - ANONYMOUS CHAT</title>
  <!-- Font Awesome & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
    body{background:#0b0e14;color:#e3e6eb;scroll-behavior:smooth}
    .navbar{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 2rem;background:rgba(18,22,28,0.85);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.05);position:sticky;top:0;z-index:1000}
    .logo-area{display:flex;align-items:center;gap:14px}
    .app-logo{width:46px;height:46px;border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 40px rgba(0,0,0,0.25);background:#111}
    .app-logo img{width:100%;height:100%;object-fit:cover;display:block}
    .logo{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;background-clip:text;color:transparent}
    .logo-sub{color:#9aa4b8;font-size:0.9rem;letter-spacing:2px}
    .nav-links{display:flex;list-style:none;gap:2.2rem}
    .nav-links a{text-decoration:none;color:#cbd5e1;font-weight:500;border-bottom:2px solid transparent;padding-bottom:4px;transition:0.2s}
    .nav-links a:hover{color:#a78bfa;border-bottom-color:#a78bfa}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer}
    .navbar .ai-indicator{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:white;cursor:pointer;z-index:10}
    section{scroll-margin-top:90px;margin-bottom:4rem;padding:2rem}
    h1{font-size:2.5rem;font-weight:600;background:linear-gradient(to right,#e0e7ff,#bdd3ff);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:1.5rem}
    h2{font-size:1.8rem;margin-bottom:1rem;color:#f1f5f9}
    .glass-card{background:rgba(20,28,36,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:28px;padding:2rem;border:1px solid rgba(255,255,255,0.05);transition:transform 0.2s;margin-bottom:1rem}
    .glass-card:hover{transform:translateY(-4px);border-color:rgba(167,139,250,0.3)}
    .external-ai-links{display:flex;flex-wrap:wrap;gap:0.75rem;margin-top:1rem}
    .ai-link-btn{background:#5b21b6;color:white;border:none;border-radius:999px;padding:0.9rem 1.4rem;text-decoration:none;font-weight:600;transition:0.2s}
    .ai-link-btn:hover{background:#7c3aed}
    footer{text-align:center;padding:2rem;color:#6c7a8a}
    /* Mobile */
    @media (max-width:768px){
      .navbar{padding:0.7rem 1rem}
      .nav-links{display:none}
      .hamburger{display:flex}
      .hamburger.active .bar:nth-child(1){transform:rotate(-45deg) translate(-5px,6px)}
      .hamburger.active .bar:nth-child(2){opacity:0}
      .hamburger.active .bar:nth-child(3){transform:rotate(45deg) translate(-5px,-6px)}
      .bar{width:25px;height:3px;background:#cbd5e1;border-radius:2px;transition:0.3s}
      .nav-links.active{display:flex;position:fixed;left:0;top:70px;flex-direction:column;background:rgba(10,16,24,0.98);width:100%;padding:2rem 0;gap:2rem;text-align:center;z-index:999}
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo-area">
      <div class="app-logo"><img src="anonymous.jpg" alt="Anonymous App Logo"></div>
      <div>
        <div class="logo">ANONYMOUS</div>
        <span class="logo-sub">CHAT AI</span>
      </div>
    </div>
    <ul class="nav-links" id="navLinks">
      <li><a href="home.html">Home</a></li>
      <li><a href="chat.html">Chat</a></li>
      <li><a href="friends.html">Friends</a></li>
      <li><a href="marketplace.html">Marketplace</a></li>
      <li><a href="ai-labs.html">AI Labs</a></li>
      <li><a href="#" id="privateNavBtn" style="color:#34d399;"><i class="fas fa-lock"></i> Private</a></li>
    </ul>
    <div class="hamburger" id="hamburger">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </div>
    <div class="ai-indicator" id="navbarAI" title="AI Assistant"><i class="fas fa-robot"></i></div>
  </nav>

  <section id="ai-labs">
    <h1><i class="fas fa-microchip"></i> AI Labs</h1>
    <div class="glass-card" style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
      <div>
        <h2>Open Gemini or ChatGPT</h2>
        <p>Use these advanced tools alongside the local anonymous bot for faster brainstorming and smarter answers.</p>
      </div>
      <div class="external-ai-links">
        <a class="ai-link-btn" href="https://gemini.google.com" target="_blank" rel="noopener">Gemini</a>
        <a class="ai-link-btn" href="https://chat.openai.com" target="_blank" rel="noopener">ChatGPT</a>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2024 Anonymous Chat. All rights reserved.</p>
  </footer>

  <script>
    // Mobile menu toggle
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');
    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      hamburger.classList.toggle('active');
    });
  </script>
</body>
</html>
