<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace - ANONYMOUS CHAT</title>
  <!-- Font Awesome & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
    body{background:#0b0e14;color:#e3e6eb;scroll-behavior:smooth}
    .navbar{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 2rem;background:rgba(18,22,28,0.85);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.05);position:sticky;top:0;z-index:1000}
    .logo-area{display:flex;align-items:center;gap:14px}
    .app-logo{width:46px;height:46px;border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 40px rgba(0,0,0,0.25);background:#111}
    .app-logo img{width:100%;height:100%;object-fit:cover;display:block}
    .logo{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;background-clip:text;color:transparent}
    .logo-sub{color:#9aa4b8;font-size:0.9rem;letter-spacing:2px}
    .nav-links{display:flex;list-style:none;gap:2.2rem}
    .nav-links a{text-decoration:none;color:#cbd5e1;font-weight:500;border-bottom:2px solid transparent;padding-bottom:4px;transition:0.2s}
    .nav-links a:hover{color:#a78bfa;border-bottom-color:#a78bfa}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer}
    .navbar .ai-indicator{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:white;cursor:pointer;z-index:10}
    section{scroll-margin-top:90px;margin-bottom:4rem;padding:2rem}
    h1{font-size:2.5rem;font-weight:600;background:linear-gradient(to right,#e0e7ff,#bdd3ff);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:1.5rem}
    h2{font-size:1.8rem;margin-bottom:1rem;color:#f1f5f9}
    .glass-card{background:rgba(20,28,36,0.7);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-radius:28px;padding:2rem;border:1px solid rgba(255,255,255,0.05);transition:transform 0.2s;margin-bottom:1rem}
    .glass-card:hover{transform:translateY(-4px);border-color:rgba(167,139,250,0.3)}
    .marketplace-form{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .marketplace-form input,.marketplace-form textarea{width:100%;background:#111827;border:1px solid #2e3a48;color:#e2e8f0;padding:14px 16px;border-radius:18px;outline:none}
    .marketplace-form textarea{grid-column:span 2;min-height:120px;resize:vertical}
    .marketplace-form button{grid-column:span 2;background:#4f46e5;border:none;border-radius:20px;padding:14px;font-weight:600;color:white;cursor:pointer;transition:0.2s}
    .marketplace-form button:hover{background:#6366f1}
    .marketplace-gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.5rem;margin-top:1.5rem}
    .marketplace-card{background:rgba(15,20,26,0.95);border:1px solid #2e3a48;border-radius:24px;overflow:hidden;box-shadow:0 18px 48px rgba(0,0,0,0.18)}
    .marketplace-card img{width:100%;height:220px;object-fit:cover}
    .marketplace-card-body{padding:1.2rem;display:flex;flex-direction:column;gap:0.75rem}
    .marketplace-card-body h3{margin:0;color:#e2e8f0}
    .marketplace-card-body p{margin:0;color:#9aa4b8}
    .marketplace-card-body .price{font-weight:700;color:#34d399;letter-spacing:0.5px}
    footer{text-align:center;padding:2rem;color:#6c7a8a}
    /* Mobile */
    @media (max-width:768px){
      .navbar{padding:0.7rem 1rem}
      .nav-links{display:none}
      .hamburger{display:flex}
      .hamburger.active .bar:nth-child(1){transform:rotate(-45deg) translate(-5px,6px)}
      .hamburger.active .bar:nth-child(2){opacity:0}
      .hamburger.active .bar:nth-child(3){transform:rotate(45deg) translate(-5px,-6px)}
      .bar{width:25px;height:3px;background:#cbd5e1;border-radius:2px;transition:0.3s}
      .nav-links.active{display:flex;position:fixed;left:0;top:70px;flex-direction:column;background:rgba(10,16,24,0.98);width:100%;padding:2rem 0;gap:2rem;text-align:center;z-index:999}
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo-area">
      <div class="app-logo"><img src="anonymous.jpg" alt="Anonymous App Logo"></div>
      <div>
        <div class="logo">ANONYMOUS</div>
        <span class="logo-sub">CHAT AI</span>
      </div>
    </div>
    <ul class="nav-links" id="navLinks">
      <li><a href="home.html">Home</a></li>
      <li><a href="chat.html">Chat</a></li>
      <li><a href="friends.html">Friends</a></li>
      <li><a href="marketplace.html">Marketplace</a></li>
      <li><a href="ai-labs.html">AI Labs</a></li>
      <li><a href="#" id="privateNavBtn" style="color:#34d399;"><i class="fas fa-lock"></i> Private</a></li>
    </ul>
    <div class="hamburger" id="hamburger">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </div>
    <div class="ai-indicator" id="navbarAI" title="AI Assistant"><i class="fas fa-robot"></i></div>
  </nav>

  <section id="marketplace">
    <h1><i class="fas fa-store-alt"></i> Marketplace</h1>
    <div class="glass-card">
      <h2>Sell with ZMW prices</h2>
      <p>Upload an image of your item, set the ZMW price, and list it for buyers instantly.</p>
      <form class="marketplace-form" id="marketForm">
        <input type="text" id="marketTitle" placeholder="Item title" required />
        <input type="number" id="marketPrice" placeholder="Price (ZMW)" min="0" step="1" required />
        <input type="file" id="marketPhoto" accept="image/*" title="Upload item photo" required />
        <textarea id="marketDesc" placeholder="Item description"></textarea>
        <button type="submit">List Item</button>
      </form>
      <div class="marketplace-gallery" id="marketGallery"></div>
    </div>
  </section>

  <footer>
    <p>&copy; 2024 Anonymous Chat. All rights reserved.</p>
  </footer>

  <script>
    // Mobile menu toggle
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');
    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      hamburger.classList.toggle('active');
    });

    // Marketplace functionality
    const marketForm = document.getElementById('marketForm');
    const marketGallery = document.getElementById('marketGallery');

    // Load items from localStorage
    function loadMarketItems() {
      const items = JSON.parse(localStorage.getItem('marketItems') || '[]');
      marketGallery.innerHTML = '';
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'marketplace-card';
        card.innerHTML = `
          <img src="${item.photo}" alt="${item.title}">
          <div class="marketplace-card-body">
            <h3>${item.title}</h3>
            <p>${item.desc}</p>
            <div class="price">${item.price} ZMW</div>
          </div>
        `;
        marketGallery.appendChild(card);
      });
    }

    // Add item
    marketForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const title = document.getElementById('marketTitle').value;
      const price = document.getElementById('marketPrice').value;
      const desc = document.getElementById('marketDesc').value;
      const photoFile = document.getElementById('marketPhoto').files[0];

      if (photoFile) {
        const reader = new FileReader();
        reader.onload = () => {
          const items = JSON.parse(localStorage.getItem('marketItems') || '[]');
          items.push({ title, price, desc, photo: reader.result });
          localStorage.setItem('marketItems', JSON.stringify(items));
          marketForm.reset();
          loadMarketItems();
        };
        reader.readAsDataURL(photoFile);
      }
    });

    // Load on page load
    loadMarketItems();
  </script>
</body>
</html>
